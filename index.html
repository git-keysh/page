<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keyshaun Sookdar | Enter the Mind</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .stage {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        .stage.active { opacity: 1; pointer-events: auto; }

        /* --- STAGE 1: Profile Intro --- */
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: containerGlow 4s infinite alternate;
        }

        #profile-img {
            width: 320px; 
            height: 320px;
            object-fit: cover;
            border-radius: 50px; /* Curved ends */
            opacity: 0;
            transform: scale(0.8);
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 1s ease-out;
        }
        
        #profile-img.fade-in { opacity: 1; transform: scale(1); }
        #profile-img.shrink-up { transform: scale(0.85) translateY(-40px); }

        #name-text {
            font-size: 4.5rem; 
            font-weight: 900;
            letter-spacing: -2px;
            margin-top: -10px;
            opacity: 0;
            transform: translateY(-60px);
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.7s ease-out;
        }
        
        #name-text.slide-down { opacity: 1; transform: translateY(0); }

        #prompt-text {
            margin-top: 40px;
            font-size: 1.3rem;
            color: #aaa;
            font-weight: 300;
            opacity: 0;
            transition: opacity 1s ease-in; /* Clean fade in */
        }
        
        #prompt-text.show { opacity: 1; animation: pulse 1.5s infinite alternate; }

        /* --- STAGE 2: Video & Glow --- */
        #glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, rgba(0,0,0,0) 60%);
            transition: background 2s ease-in-out, transform 2s ease-in-out;
            opacity: 0;
        }
        
        #glow.active { opacity: 1; }
        #glow.purple { background: radial-gradient(circle, rgba(128, 0, 128, 0.6) 0%, rgba(0,0,0,0) 70%); transform: translate(-50%, -50%) scale(1.3); }

        #intro-video {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
        }

        /* --- STAGE 3: 2D Colored Static --- */
        #static-noise {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            z-index: 99;
            /* Multi-layered color rectangles for 2D static look */
            background-image: 
                repeating-linear-gradient(90deg, rgba(128,0,128,0.3) 0% 2%, transparent 2% 5%),
                repeating-linear-gradient(0deg, rgba(0,255,127,0.2) 0% 1%, transparent 1% 4%),
                repeating-linear-gradient(90deg, rgba(0,0,139,0.3) 0% 3%, transparent 3% 6%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.1) 0% 2%, transparent 2% 8%);
            background-size: 100% 100%;
            animation: noiseFlicker 0.05s infinite;
        }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes containerGlow { from { transform: scale(1); } to { transform: scale(1.01); } }
        
        @keyframes noiseFlicker {
            0% { transform: translate(0,0); filter: hue-rotate(0deg); }
            25% { transform: translate(-2%, 1%); filter: hue-rotate(90deg); }
            50% { transform: translate(1%, -2%); filter: hue-rotate(180deg); }
            75% { transform: translate(-1%, -1%); filter: hue-rotate(270deg); }
            100% { transform: translate(0,0); }
        }

        @media (max-width: 768px) {
            #profile-img { width: 220px; height: 220px; border-radius: 35px; }
            #name-text { font-size: 2.5rem; }
            #prompt-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="stage1" class="stage active">
        <div id="main-container">
            <img src="cdn/assets/me.png" alt="Keyshaun Sookdar" id="profile-img">
            <h1 id="name-text">Keyshaun Sookdar</h1>
            <p id="prompt-text">Click anywhere to enter the mind of Keyshaun.</p>
        </div>
    </div>

    <div id="stage2" class="stage">
        <div id="glow"></div>
        <video id="intro-video" src="cdn/assets/intro.mp4" playsinline webkit-playsinline></video>
    </div>

    <div id="stage3" class="stage">
        <div id="static-noise"></div>
        <audio id="static-audio" src="https://www.soundjay.com/mechanical/sounds/tv-static-05.mp3" preload="auto"></audio>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profileImg = document.getElementById('profile-img');
            const nameText = document.getElementById('name-text');
            const promptText = document.getElementById('prompt-text');
            const stage1 = document.getElementById('stage1');
            const stage2 = document.getElementById('stage2');
            const video = document.getElementById('intro-video');
            const glow = document.getElementById('glow');
            const staticNoise = document.getElementById('static-noise');
            const staticAudio = document.getElementById('static-audio');

            let introStarted = false;

            // --- Sequence ---
            setTimeout(() => {
                profileImg.classList.add('fade-in');
                
                setTimeout(() => {
                    profileImg.classList.add('shrink-up');
                    
                    setTimeout(() => {
                        nameText.classList.add('slide-down');
                        
                        // WAIT for Name slide to finish (0.7s transition) then show prompt
                        setTimeout(() => {
                            promptText.classList.add('show');
                        }, 750); 

                    }, 300); 
                }, 1200); 
            }, 500);

            document.body.addEventListener('click', () => {
                if (introStarted) return;
                introStarted = true;

                stage1.classList.remove('active');
                stage2.classList.add('active');
                glow.classList.add('active');

                setTimeout(() => {
                    video.play().catch(() => {
                        video.muted = true;
                        video.play();
                    });
                    
                    video.addEventListener('ended', triggerStaticTransition);
                    // Backup trigger at 23s
                    setTimeout(triggerStaticTransition, 23500);
                }, 1000);
            });

            function triggerStaticTransition() {
                if(stage2.style.display === 'none') return; 
                
                video.pause();
                stage2.classList.remove('active');
                document.getElementById('stage3').classList.add('active');

                staticAudio.volume = 0.1;
                staticAudio.play();
                staticNoise.style.opacity = '0.4';
                glow.classList.add('purple');

                // Ramp up
                setTimeout(() => {
                    staticNoise.style.opacity = '1';
                    staticAudio.volume = 1.0;
                    
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 2800);
                }, 2000);
            }
        });
    </script>
</body>
</html>
