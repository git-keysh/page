<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RCXC | Global Multiplayer Duel</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 20 DYNAMIC PLAYER COLOR PROFILES --- */
        .p-0 { background: #0047AB; color: white; } .p-1 { background: #D2122E; color: white; }
        .p-2 { background: #FFD700; color: black; } .p-3 { background: #008751; color: white; }
        .p-4 { background: #FF4500; color: white; } .p-5 { background: #9d00ff; color: white; }
        .p-6 { background: #00FFFF; color: black; } .p-7 { background: #FF00FF; color: white; }
        .p-8 { background: #FF8C00; color: white; } .p-9 { background: #ADFF2F; color: black; }
        .p-10 { background: #4B0082; color: white; } .p-11 { background: #00FF00; color: black; }
        .p-12 { background: #1E90FF; color: white; } .p-13 { background: #B22222; color: white; }
        .p-14 { background: #8B4513; color: white; } .p-15 { background: #2F4F4F; color: white; }
        .p-16 { background: #FF1493; color: white; } .p-17 { background: #40E0D0; color: black; }
        .p-18 { background: #EE82EE; color: black; } .p-19 { background: #808000; color: white; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            width: 92%;
            max-width: 480px;
            padding: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* --- ANIMATIONS --- */
        @keyframes passIn {
            0% { transform: scale(0.6); opacity: 0; filter: blur(15px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pass-screen {
            position: fixed; inset: 0; z-index: 100; display: none;
            align-items: center; justify-content: center; text-align: center;
        }
        .pass-text {
            font-size: 3.5rem; font-weight: 900; text-transform: uppercase;
            animation: passIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        /* --- GAMEPLAY UI --- */
        .option-btn {
            width: 100%; padding: 22px; margin-bottom: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; text-align: left;
            font-size: 16px; font-weight: 600; transition: 0.2s;
        }
        .option-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .option-btn.correct { background: #22c55e !important; color: white; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }

        .timer-strip { position: fixed; top: 0; left: 0; height: 10px; background: #fff; width: 100%; transition: width 0.1s linear; z-index: 1000; }
        
        #player-tag { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="game-audio" loop>
        <source src="https://keyshaun.pages.dev/cdn/audio/The 20 Second Answer Medley.mp3" type="audio/mpeg">
    </audio>

    <div id="pass-overlay" class="pass-screen">
        <div id="pass-content" class="pass-text">PASS TO NEXT</div>
    </div>

    <div id="lobby" class="glass-panel">
        <h1 class="text-4xl font-black tracking-tighter mb-1">RCXC GLOBAL</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-8">Multiplayer Synchronization Engine</p>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Participant Names (Comma Separated)</label>
                <input type="text" id="p-names" value="Nigel, Kyler, Keyshaun" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-500 font-medium">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Timer (sec)</label>
                    <input type="number" id="p-time" value="10" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Difficulty</label>
                    <select id="p-diff" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none appearance-none">
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
            </div>

            <button onclick="setupGame()" class="w-full bg-white text-black font-black py-6 rounded-3xl shadow-[0_20px_40px_rgba(255,255,255,0.15)] active:scale-95 transition">INITIALIZE SESSION</button>
        </div>
    </div>

    <div id="game-ui" class="glass-panel hidden">
        <div class="timer-strip" id="t-bar"></div>
        <div class="flex justify-between items-center mb-8">
            <span id="player-tag" class="text-[11px] font-black uppercase tracking-widest px-4 py-2 rounded-full border-2 border-current">PLAYER</span>
            <span id="q-count" class="text-[10px] font-mono opacity-50 uppercase">Stage: 1/20</span>
        </div>
        
        <h2 id="q-text" class="text-2xl md:text-3xl font-bold mb-10 leading-tight tracking-tight">Loading Protocol...</h2>
        
        <div id="options-box" class="space-y-1"></div>
    </div>

    <div id="end-ui" class="glass-panel hidden text-center">
        <h1 class="text-4xl font-black mb-2">SESSION OVER</h1>
        <p class="text-zinc-500 text-xs uppercase tracking-widest mb-10">Global Ranking Results</p>
        <div id="leaderboard" class="space-y-3 mb-10 text-left"></div>
        <button onclick="location.reload()" class="w-full py-5 bg-white/5 border border-white/10 rounded-2xl text-xs uppercase font-bold tracking-widest hover:bg-white hover:text-black transition">Restart Challenge</button>
    </div>

    <script>
        const DB_URL = "https://keyshaun.pages.dev/storage/rcxc-database.json";
        const AUDIO = document.getElementById('game-audio');
        
        let players = [];
        let pIdx = 0; 
        let qIdx = 0; 
        const qPerPerson = 20;
        let timer;
        let timeLeft;

        async function setupGame() {
            const namesInput = document.getElementById('p-names').value;
            const names = namesInput.split(',').map(n => n.trim()).filter(n => n.length > 0);
            const diff = document.getElementById('p-diff').value;
            
            if (names.length === 0) return alert("Enter player names.");

            players = names.map(n => ({ name: n, score: 0, questions: [] }));

            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const filtered = data.questions.filter(q => q.difficulty === diff);
                
                if (filtered.length < qPerPerson) {
                    alert(`Not enough ${diff} questions in database! Check JSON.`);
                    return;
                }

                // Randomize and distribute questions
                let pool = [...filtered].sort(() => Math.random() - 0.5);
                players.forEach(p => {
                    p.questions = pool.splice(0, qPerPerson);
                });

                document.getElementById('lobby').classList.add('hidden');
                AUDIO.volume = 0.5;
                AUDIO.play();
                startTurnTransition();
            } catch (e) {
                alert("Database Sync Failed. Check URL.");
            }
        }

        function startTurnTransition() {
            const overlay = document.getElementById('pass-overlay');
            const content = document.getElementById('pass-content');
            const currentPlayer = players[pIdx];

            document.getElementById('game-ui').classList.add('hidden');
            
            // Apply Dynamic Color and Text Logic
            const colorClass = `p-${pIdx % 20}`;
            document.body.className = colorClass; 
            overlay.className = `pass-screen ${colorClass}`;
            
            content.innerText = `PASS TO ${currentPlayer.name.toUpperCase()}`;
            overlay.style.display = 'flex';

            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('game-ui').classList.remove('hidden');
                loadQuestion();
            }, 1800);
        }

        function loadQuestion() {
            const p = players[pIdx];
            const q = p.questions[qIdx];
            
            document.getElementById('player-tag').innerText = p.name;
            document.getElementById('q-count').innerText = `Stage: ${qIdx + 1}/${qPerPerson}`;
            document.getElementById('q-text').innerText = q.question;
            
            const options = [q.correct_answer, ...q.wrong_answers].sort(() => Math.random() - 0.5);
            const box = document.getElementById('options-box');
            box.innerHTML = '';

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => check(opt, q.correct_answer, b);
                box.appendChild(b);
            });

            startTimer();
        }

        function startTimer() {
            const max = parseInt(document.getElementById('p-time').value);
            timeLeft = max;
            const bar = document.getElementById('t-bar');
            clearInterval(timer);

            timer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / max) * 100 + "%";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    check(null, players[pIdx].questions[qIdx].correct_answer);
                }
            }, 100);
        }

        function check(selected, correct, btn) {
            clearInterval(timer);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) b.classList.add('correct');
            });

            if (selected === correct) {
                players[pIdx].score++;
            } else if (btn) {
                btn.classList.add('wrong');
            }

            setTimeout(() => {
                qIdx++;
                if (qIdx >= qPerPerson) {
                    qIdx = 0;
                    pIdx++;
                    if (pIdx >= players.length) return endSession();
                    startTurnTransition();
                } else {
                    loadQuestion();
                }
            }, 1200);
        }

        function endSession() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-ui').classList.remove('hidden');
            document.body.className = "bg-black";
            AUDIO.pause();

            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            players.sort((a,b) => b.score - a.score).forEach((p, i) => {
                board.innerHTML += `
                    <div class="flex justify-between items-center p-5 bg-white/5 rounded-2xl border-l-4 ${i === 0 ? 'border-yellow-400' : 'border-zinc-700'}">
                        <div class="flex flex-col">
                            <span class="text-[10px] uppercase opacity-40">Rank #${i+1}</span>
                            <span class="font-bold text-lg">${p.name}</span>
                        </div>
                        <span class="font-mono text-2xl font-bold">${p.score}/${qPerPerson}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
