<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RCXC | Multiplayer Duel</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --p-color: #0a0a0a; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- PLAYER COLORS --- */
        .bg-player-blue { background: #0047AB !important; }
        .bg-player-red { background: #D2122E !important; }
        .bg-player-yellow { background: #FFD700 !important; color: #000 !important; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            width: 92%;
            max-width: 480px;
            padding: 2.5rem;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- ANIMATIONS --- */
        @keyframes lightUp {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        .pass-screen {
            position: fixed; inset: 0; z-index: 100; display: none;
            align-items: center; justify-content: center; text-align: center;
        }
        .pass-text {
            font-size: 3rem; font-weight: 900; text-transform: uppercase;
            animation: lightUp 1.5s ease-out forwards;
        }

        .option-btn {
            width: 100%; padding: 20px; margin-bottom: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; text-align: left;
            font-size: 16px; font-weight: 500; transition: 0.2s;
        }
        .option-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }
        .option-btn.correct { background: #22c55e !important; color: white; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }

        .timer-strip { position: fixed; top: 0; left: 0; height: 8px; background: #fff; width: 100%; transition: width 0.1s linear; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="game-audio" loop>
        <source src="https://keyshaun.pages.dev/cdn/audio/The 20 Second Answer Medley.mp3" type="audio/mpeg">
    </audio>

    <div id="pass-overlay" class="pass-screen">
        <div id="pass-content" class="pass-text">PASS TO NIGEL</div>
    </div>

    <div id="lobby" class="glass-panel">
        <h1 class="text-3xl font-bold tracking-tighter mb-1">RCXC MULTI</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest mb-8">Global Database Engine v2.0</p>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Players (Comma Separated)</label>
                <input type="text" id="p-names" value="Nigel, Kyler, Keyshaun" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Timer (sec)</label>
                    <input type="number" id="p-time" value="10" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Difficulty</label>
                    <select id="p-diff" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
            </div>

            <button onclick="setupGame()" class="w-full bg-white text-black font-bold py-5 rounded-2xl shadow-[0_0_30px_rgba(255,255,255,0.2)]">START DUEL</button>
        </div>
    </div>

    <div id="game-ui" class="glass-panel hidden">
        <div class="timer-strip" id="t-bar"></div>
        <div class="flex justify-between items-center mb-6">
            <span id="player-tag" class="text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full border border-current">Nigel</span>
            <span id="q-count" class="text-[10px] font-mono opacity-60">Q: 1/20</span>
        </div>
        
        <h2 id="q-text" class="text-xl md:text-2xl font-bold mb-8 leading-snug">System Initializing...</h2>
        
        <div id="options-box"></div>
    </div>

    <div id="end-ui" class="glass-panel hidden text-center">
        <h1 class="text-4xl font-black mb-6">DUEL COMPLETE</h1>
        <div id="leaderboard" class="space-y-4 mb-10 text-left"></div>
        <button onclick="location.reload()" class="w-full py-4 border border-white/10 rounded-xl text-xs uppercase font-bold tracking-widest">Restart Session</button>
    </div>

    <script>
        const DB_URL = "https://keyshaun.pages.dev/storage/rcxc-database.json";
        const AUDIO = document.getElementById('game-audio');
        
        let players = [];
        let db = [];
        let pIdx = 0; // Current Player
        let qIdx = 0; // Current Question set for that player
        let qPerPerson = 20;
        let timer;
        let timeLeft;

        const pStyles = {
            0: "bg-player-blue",   // Player 1
            1: "bg-player-red",    // Player 2
            2: "bg-player-yellow"  // Player 3
        };

        async function setupGame() {
            const names = document.getElementById('p-names').value.split(',').map(n => n.trim());
            const diff = document.getElementById('p-diff').value;
            
            players = names.map(n => ({ name: n, score: 0, questions: [] }));

            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const filtered = data.questions.filter(q => q.difficulty === diff);
                
                // Assign unique questions to each player
                let pool = [...filtered].sort(() => Math.random() - 0.5);
                players.forEach(p => {
                    p.questions = pool.splice(0, qPerPerson);
                });

                document.getElementById('lobby').classList.add('hidden');
                AUDIO.play();
                startTurnTransition();
            } catch (e) {
                alert("Failed to sync with global database.");
            }
        }

        function startTurnTransition() {
            const overlay = document.getElementById('pass-overlay');
            const content = document.getElementById('pass-content');
            const currentPlayer = players[pIdx];

            document.getElementById('game-ui').classList.add('hidden');
            document.body.className = pStyles[pIdx % 3]; 
            
            content.innerText = `PASS TO ${currentPlayer.name}`;
            overlay.style.display = 'flex';

            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('game-ui').classList.remove('hidden');
                loadQuestion();
            }, 1600);
        }

        function loadQuestion() {
            const p = players[pIdx];
            const q = p.questions[qIdx];
            
            document.getElementById('player-tag').innerText = p.name;
            document.getElementById('q-count').innerText = `Q: ${qIdx + 1}/${qPerPerson}`;
            document.getElementById('q-text').innerText = q.question;
            
            const options = [q.correct_answer, ...q.wrong_answers].sort(() => Math.random() - 0.5);
            const box = document.getElementById('options-box');
            box.innerHTML = '';

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => check(opt, q.correct_answer, b);
                box.appendChild(b);
            });

            startTimer();
        }

        function startTimer() {
            const max = parseInt(document.getElementById('p-time').value);
            timeLeft = max;
            const bar = document.getElementById('t-bar');
            clearInterval(timer);

            timer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / max) * 100 + "%";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    check(null, players[pIdx].questions[qIdx].correct_answer);
                }
            }, 100);
        }

        function check(selected, correct, btn) {
            clearInterval(timer);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) b.classList.add('correct');
            });

            if (selected === correct) players[pIdx].score++;
            else if (btn) btn.classList.add('wrong');

            setTimeout(() => {
                qIdx++;
                if (qIdx >= qPerPerson) {
                    qIdx = 0;
                    pIdx++;
                    if (pIdx >= players.length) return endSession();
                    startTurnTransition();
                } else {
                    loadQuestion();
                }
            }, 1200);
        }

        function endSession() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-ui').classList.remove('hidden');
            document.body.className = "bg-black";
            AUDIO.pause();

            const board = document.getElementById('leaderboard');
            players.sort((a,b) => b.score - a.score).forEach((p, i) => {
                board.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border-l-4 ${i === 0 ? 'border-yellow-400' : 'border-purple-500'}">
                        <span class="font-bold">${i+1}. ${p.name}</span>
                        <span class="font-mono text-xl">${p.score}/${qPerPerson}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
