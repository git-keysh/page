<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RCXC | Pass The Phone</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 20 DYNAMIC PLAYER COLOR PROFILES --- */
        .p-0 { background: #0047AB; color: white; } .p-1 { background: #D2122E; color: white; }
        .p-2 { background: #FFD700; color: black; } .p-3 { background: #008751; color: white; }
        .p-4 { background: #FF4500; color: white; } .p-5 { background: #9d00ff; color: white; }
        .p-6 { background: #00FFFF; color: black; } .p-7 { background: #FF00FF; color: white; }
        .p-8 { background: #FF8C00; color: white; } .p-9 { background: #ADFF2F; color: black; }
        .p-10 { background: #4B0082; color: white; } .p-11 { background: #00FF00; color: black; }
        .p-12 { background: #1E90FF; color: white; } .p-13 { background: #B22222; color: white; }
        .p-14 { background: #8B4513; color: white; } .p-15 { background: #2F4F4F; color: white; }
        .p-16 { background: #FF1493; color: white; } .p-17 { background: #40E0D0; color: black; }
        .p-18 { background: #EE82EE; color: black; } .p-19 { background: #808000; color: white; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px;
            width: 92%;
            max-width: 480px;
            padding: 2.5rem;
            position: relative;
            z-index: 10;
        }

        /* --- HIGH QUALITY TRANSITION --- */
        @keyframes passIn {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
        }
        .pass-screen {
            position: fixed; inset: 0; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .pass-text {
            font-size: 3.5rem; font-weight: 900; line-height: 1;
            animation: passIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .option-btn {
            width: 100%; padding: 22px; margin-bottom: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; text-align: left;
            font-size: 16px; font-weight: 600; transition: 0.2s;
        }
        .option-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .option-btn.correct { background: #22c55e !important; color: white; border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .option-btn.wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }

        .timer-strip { position: fixed; top: 0; left: 0; height: 10px; background: #fff; width: 100%; transition: width 0.1s linear; z-index: 1000; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="game-audio" loop>
        <source src="https://keyshaun.pages.dev/cdn/audio/The 20 Second Answer Medley.mp3" type="audio/mpeg">
    </audio>

    <div id="pass-overlay" class="pass-screen">
        <div class="text-[12px] uppercase tracking-[0.5em] mb-4 opacity-70 font-bold" id="round-tag">ROUND 1 / 20</div>
        <div id="pass-content" class="pass-text">PASS TO <br> PLAYER</div>
    </div>

    <div id="lobby" class="glass-panel">
        <h1 class="text-4xl font-black tracking-tighter mb-1">RCXC GLOBAL</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-8">Rotation Multiplayer Engine</p>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Players (Comma Separated)</label>
                <input type="text" id="p-names" value="Nigel, Kyler, Keyshaun" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-500 font-medium">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Timer (sec)</label>
                    <input type="number" id="p-time" value="10" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 tracking-widest block mb-2">Difficulty</label>
                    <select id="p-diff" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none appearance-none">
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
            </div>

            <button onclick="setupGame()" class="w-full bg-white text-black font-black py-6 rounded-3xl shadow-[0_20px_40px_rgba(255,255,255,0.1)] active:scale-95 transition">START DUEL</button>
        </div>
    </div>

    <div id="game-ui" class="glass-panel hidden">
        <div class="timer-strip" id="t-bar"></div>
        <div class="flex justify-between items-center mb-8">
            <span id="player-tag" class="text-[11px] font-black uppercase tracking-widest px-4 py-2 rounded-full border-2 border-current">PLAYER</span>
            <span id="q-count" class="text-[10px] font-mono opacity-50">QUESTION 1/20</span>
        </div>
        
        <h2 id="q-text" class="text-2xl font-bold mb-10 leading-tight">Syncing...</h2>
        <div id="options-box" class="space-y-1"></div>
    </div>

    <div id="end-ui" class="glass-panel hidden text-center">
        <h1 class="text-4xl font-black mb-1">LEADERBOARD</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest mb-10">Match Conclusion</p>
        <div id="leaderboard" class="space-y-3 mb-10 text-left"></div>
        <button onclick="location.reload()" class="w-full py-5 bg-white text-black rounded-2xl text-xs uppercase font-black tracking-widest">Rematch</button>
    </div>

    <script>
        const DB_URL = "https://keyshaun.pages.dev/storage/rcxc-database.json";
        const AUDIO = document.getElementById('game-audio');
        
        let players = [];
        let pIdx = 0; // Index of the current player in the rotation
        let currentRound = 0; // Which question number we are on (0 to 19)
        const totalRounds = 20;
        let timer;
        let timeLeft;

        async function setupGame() {
            const namesInput = document.getElementById('p-names').value;
            const names = namesInput.split(',').map(n => n.trim()).filter(n => n.length > 0);
            const diff = document.getElementById('p-diff').value;
            
            if (names.length === 0) return;

            players = names.map(n => ({ name: n, score: 0, questions: [] }));

            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const filtered = data.questions.filter(q => q.difficulty === diff);
                
                let pool = [...filtered].sort(() => Math.random() - 0.5);
                players.forEach(p => {
                    p.questions = pool.splice(0, totalRounds);
                });

                document.getElementById('lobby').classList.add('hidden');
                AUDIO.volume = 0.4;
                AUDIO.play();
                startTurnTransition();
            } catch (e) {
                alert("Database Error.");
            }
        }

        function startTurnTransition() {
            const overlay = document.getElementById('pass-overlay');
            const content = document.getElementById('pass-content');
            const currentPlayer = players[pIdx];

            document.getElementById('game-ui').classList.add('hidden');
            
            const colorClass = `p-${pIdx % 20}`;
            document.body.className = colorClass; 
            overlay.className = `pass-screen ${colorClass}`;
            
            document.getElementById('round-tag').innerText = `ROUND ${currentRound + 1} / ${totalRounds}`;
            content.innerHTML = `PASS TO <br> ${currentPlayer.name.toUpperCase()}`;
            overlay.style.display = 'flex';

            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('game-ui').classList.remove('hidden');
                loadQuestion();
            }, 1800);
        }

        function loadQuestion() {
            const p = players[pIdx];
            const q = p.questions[currentRound];
            
            document.getElementById('player-tag').innerText = p.name;
            document.getElementById('q-count').innerText = `QUESTION ${currentRound + 1}/${totalRounds}`;
            document.getElementById('q-text').innerText = q.question;
            
            const options = [q.correct_answer, ...q.wrong_answers].sort(() => Math.random() - 0.5);
            const box = document.getElementById('options-box');
            box.innerHTML = '';

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => check(opt, q.correct_answer, b);
                box.appendChild(b);
            });

            startTimer();
        }

        function startTimer() {
            const max = parseInt(document.getElementById('p-time').value);
            timeLeft = max;
            const bar = document.getElementById('t-bar');
            clearInterval(timer);

            timer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / max) * 100 + "%";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    check(null, players[pIdx].questions[currentRound].correct_answer);
                }
            }, 100);
        }

        function check(selected, correct, btn) {
            clearInterval(timer);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) b.classList.add('correct');
            });

            if (selected === correct) players[pIdx].score++;
            else if (btn) btn.classList.add('wrong');

            setTimeout(() => {
                // MOVE TO NEXT PLAYER
                pIdx++;

                // IF ALL PLAYERS FINISHED THIS ROUND
                if (pIdx >= players.length) {
                    pIdx = 0;
                    currentRound++;
                }

                // IF ALL ROUNDS ARE FINISHED
                if (currentRound >= totalRounds) {
                    endSession();
                } else {
                    startTurnTransition();
                }
            }, 1300);
        }

        function endSession() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-ui').classList.remove('hidden');
            document.body.className = "bg-black";
            AUDIO.pause();

            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            
            // Sort leaderboard by score
            const sorted = [...players].sort((a,b) => b.score - a.score);
            
            sorted.forEach((p, i) => {
                const colorIdx = players.indexOf(p) % 20;
                board.innerHTML += `
                    <div class="flex justify-between items-center p-5 bg-white/5 rounded-2xl border-l-4 p-${colorIdx}">
                        <div class="flex flex-col">
                            <span class="text-[10px] uppercase opacity-50 font-black">Rank ${i+1}</span>
                            <span class="font-bold text-lg">${p.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-mono text-2xl font-black">${p.score}</span>
                            <span class="text-[10px] opacity-40 block">POINTS</span>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
